<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Pedidos - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/pedidos/cadastrar}">Novo Pedido</a>
        </div>
    </div>
</nav>

<main class="container mt-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Pedidos</h2>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Roupa</th>
            <th>Quantidade</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pedido : ${pedidos}">
            <td th:text="${pedido.id}"></td>
            <td th:text="${pedido.cliente != null ? pedido.cliente.nome : ''}"></td>
            <td th:text="${pedido.roupa != null ? pedido.roupa.nome : ''}"></td>
            <td th:text="${pedido.quantidade}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a class="btn btn-sm btn-primary" th:href="@{/pedidos/editar/{id}(id=${pedido.id})}">Editar</a>
                    <form th:action="@{/pedidos/excluir/{id}(id=${pedido.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${pedidos == null} or ${#lists.isEmpty(pedidos)}">
            <td colspan="5" class="text-center text-muted">Nenhum pedido cadastrado.</td>
        </tr>
        </tbody>
    </table>

</main>

</body>
</html>
