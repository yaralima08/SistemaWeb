<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Roupas - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/roupas/cadastrar}">Nova Roupa</a>
        </div>
    </div>
</nav>

<main class="container mt-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Roupas</h2>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Tamanho</th>
            <th>Cor</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Vendedor</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="roupa : ${roupas}">
            <td th:text="${roupa.id}"></td>
            <td th:text="${roupa.nome}"></td>
            <td th:text="${roupa.categoria}"></td>
            <td th:text="${roupa.tamanho}"></td>
            <td th:text="${roupa.cor}"></td>
            <td th:text="${roupa.preco}"></td>
            <td th:text="${roupa.estoque}"></td>
            <td th:text="${roupa.vendedor != null ? roupa.vendedor.nomeLoja : ''}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a class="btn btn-sm btn-primary" th:href="@{/roupas/editar/{id}(id=${roupa.id})}">Editar</a>
                    <form th:action="@{/roupas/excluir/{id}(id=${roupa.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${roupas == null} or ${#lists.isEmpty(roupas)}">
            <td colspan="9" class="text-center text-muted">Nenhuma roupa cadastrada.</td>
        </tr>
        </tbody>
    </table>

</main>

</body>
</html>
