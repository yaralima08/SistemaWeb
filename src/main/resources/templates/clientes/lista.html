<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Clientes - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/clientes/cadastrar}">Novo Cliente</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Clientes</h2>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cliente : ${clientes}">
            <td th:text="${cliente.id}"></td>
            <td th:text="${cliente.nome}"></td>
            <td th:text="${cliente.email}"></td>
            <td th:text="${cliente.cpf}"></td>
            <td th:text="${cliente.telefone}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a class="btn btn-sm btn-primary" th:href="@{/clientes/editar/{id}(id=${cliente.id})}">Editar</a>
                    <form th:action="@{/clientes/excluir/{id}(id=${cliente.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Excluir cliente?');">Excluir</button>
                    </form>
                </div>
            </td>
        </tr>
        <tr th:if="${clientes == null} or ${#lists.isEmpty(clientes)}">
            <td colspan="6" class="text-center text-muted">Nenhum cliente cadastrado.</td>
        </tr>
        </tbody>
    </table>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
