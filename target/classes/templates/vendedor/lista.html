<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Vendedores - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/vendedores/cadastrar}">Novo Vendedor</a>
        </div>
    </div>
</nav>

<main class="container mt-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Vendedores</h2>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome da Loja</th>
            <th>Email</th>
            <th>CNPJ</th>
            <th>Telefone/Endereço</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendedor : ${vendedores}">
            <td th:text="${vendedor.id}"></td>
            <td th:text="${vendedor.nomeLoja}"></td>
            <td th:text="${vendedor.email}"></td>
            <td th:text="${vendedor.cnpj}"></td>
            <td th:text="${vendedor.rua + ', ' + vendedor.numero + ' - ' + vendedor.bairro}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a class="btn btn-sm btn-primary" th:href="@{/vendedores/editar/{id}(id=${vendedor.id})}">Editar</a>
                    <form th:action="@{/vendedores/excluir/{id}(id=${vendedor.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${vendedores == null} or ${#lists.isEmpty(vendedores)}">
            <td colspan="6" class="text-center text-muted">Nenhum vendedor cadastrado.</td>
        </tr>
        </tbody>
    </table>

</main>

</body>
</html>
