<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário Vendedor - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/vendedores}">Voltar</a>
        </div>
    </div>
</nav>

<main class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">

            <h2 class="mb-3"
                th:text="${modo == 'edicao'} ? 'Editar Vendedor' : 'Cadastrar Vendedor'">
                Cadastrar Vendedor
            </h2>

            <div th:if="${#fields != null and #fields.hasErrors()}"
                 class="alert alert-danger">
                Existem erros no formulário. Verifique os campos em vermelho.
            </div>

            <form th:object="${vendedor}"
                  th:action="${modo == 'edicao'} ?
                  @{/vendedores/editar/{id}(id=${vendedor.id})} :
                  @{/vendedores/cadastrar}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nome da Loja</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nomeLoja}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           class="form-control"
                           th:field="*{email}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{senha}">
                </div>

                <div class="mb-3">
                    <label class="form-label">CNPJ</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{cnpj}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control"
                              rows="3"
                              th:field="*{descricao}"></textarea>
                </div>

                <h4 class="mt-4">Endereço</h4>

                <div class="mb-3">
                    <label class="form-label">Rua</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{rua}">
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Número</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{numero}">
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Bairro</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{bairro}">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <label class="form-label">Cidade</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{cidade}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Estado</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{estado}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">CEP</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{cep}">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Salvar
                    </button>

                    <a th:href="@{/vendedores}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>

</main>

</body>
</html>
