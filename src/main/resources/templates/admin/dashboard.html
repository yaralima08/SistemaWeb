<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.title}">Admin - StyleStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .admin-card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; transition: all 0.3s ease; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(108,99,255,0.15); }
        .admin-card i { font-size: 3rem; margin-bottom: 1rem; }
        .admin-card h2 { font-size: 2rem; margin: 0.5rem 0; }
        .admin-card p { color: #636E72; }
        .admin-card .btn { margin-top: 0.5rem; }
        .purple i { color: #6C63FF; }
        .green i { color: #00C9A7; }
        .pink i { color: #FF6584; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo"><span class="logo-icon">👗</span><span>StyleStore</span></a>
            <nav class="nav-menu">
                <a href="/"><i class="fas fa-home"></i> <span th:text="#{menu.home}">Início</span></a>
                <a href="/admin/dashboard" class="active"><i class="fas fa-crown"></i> <span th:text="#{menu.admin}">Admin</span></a>
                <div style="display:flex;gap:0.3rem;align-items:center;margin-left:0.5rem;">
                    <a href="?lang=pt_BR" title="Português" style="padding:0.3rem 0.5rem;font-size:1.2rem;text-decoration:none;background:rgba(255,255,255,0.15);border-radius:4px;">🇧🇷</a>
                    <a href="?lang=en" title="English" style="padding:0.3rem 0.5rem;font-size:1.2rem;text-decoration:none;background:rgba(255,255,255,0.15);border-radius:4px;">🇺🇸</a>
                </div>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> <span th:text="#{app.logout}">Sair</span></a>
            </nav>
        </div>
    </header>

    <main style="max-width:1280px;margin:0 auto;padding:2rem;">
        <h1 style="margin-bottom:2rem;"><i class="fas fa-crown" style="color:#FFD700;"></i> <span th:text="#{admin.title}">Painel Administrativo</span></h1>

        <div class="admin-grid">
            <div class="admin-card purple">
                <i class="fas fa-users"></i>
                <h2 th:text="${totalClientes}">0</h2>
                <p><span th:text="#{admin.total.clientes}">Total de Clientes</span></p>
                <a href="/admin/clientes" class="btn btn-primary"><span th:text="#{admin.clientes}">Gerenciar</span></a>
            </div>
            <div class="admin-card green">
                <i class="fas fa-store"></i>
                <h2 th:text="${totalVendedores}">0</h2>
                <p><span th:text="#{admin.total.vendedores}">Total de Vendedores</span></p>
                <a href="/admin/vendedores" class="btn btn-primary"><span th:text="#{admin.vendedores}">Gerenciar</span></a>
            </div>
            <div class="admin-card pink">
                <i class="fas fa-tshirt"></i>
                <h2 th:text="${totalProdutos}">0</h2>
                <p><span th:text="#{admin.total.produtos}">Total de Produtos</span></p>
                <a href="/admin/produtos" class="btn btn-primary"><span th:text="#{admin.produtos}">Visualizar</span></a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div><h4>👗 StyleStore</h4><p>UFScar - Departamento de Computação</p></div>
            <div><h4>Idioma</h4><a href="?lang=pt_BR">🇧🇷 Português</a><a href="?lang=en">🇺🇸 English</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 StyleStore</p></div>
    </footer>
</body>
</html>
