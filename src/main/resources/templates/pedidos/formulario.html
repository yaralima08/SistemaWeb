<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário Pedido - Sistema de Roupas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Sistema de Roupas</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/pedidos}">Voltar</a>
        </div>
    </div>
</nav>

<main class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <h2 class="mb-4"
                th:text="${modo == 'edicao'} ? 'Editar Pedido' : 'Cadastrar Pedido'">
                Pedido
            </h2>

            <form th:object="${pedido}"
                  th:action="${modo == 'edicao'} ?
                  @{/pedidos/editar/{id}(id=${pedido.id})} :
                  @{/pedidos/cadastrar}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Cliente</label>

                    <select class="form-select"
                            th:field="*{cliente}">
                        <option value="">Selecione...</option>

                        <option th:each="c : ${clientes}"
                                th:value="${c.id}"
                                th:text="${c.nome}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Roupa</label>

                    <select class="form-select"
                            th:field="*{roupa}">
                        <option value="">Selecione...</option>

                        <option th:each="r : ${roupas}"
                                th:value="${r.id}"
                                th:text="${r.nome}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{quantidade}">
                </div>

                <button type="submit" class="btn btn-success">
                    Salvar
                </button>

                <a th:href="@{/pedidos}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>
    </div>

</main>

</body>
</html>
